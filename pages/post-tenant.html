<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find your home - Connect Thai Home</title>
    <!-- Use similar font as DDProperty -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/post-home.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .post-page-container {
            max-width: 850px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
    </style>
</head>
<body style="background-color: var(--bg-light);">
    <header class="navbar">
        <div class="logo">
            <a href="../index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-house-chimney icon-red"></i>
                <span>Connect Thai Home</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="../index.html">Home</a>
            <a href="#">Buy <i class="fa-solid fa-chevron-down arrow"></i></a>
            <a href="#">Rent <i class="fa-solid fa-chevron-down arrow"></i></a>
            <a href="#">New Projects <i class="fa-solid fa-chevron-down arrow"></i></a>
            <a href="#">Guides</a>
        </nav>
        <div class="nav-right">
            <a href="favorites.html" class="nav-points" title="Manage Points">
                <i class="fa-solid fa-coins"></i>
                <span>My Point: 2</span>
            </a>
            <a href="favorites.html" class="nav-fav">
                <i class="fa-solid fa-heart"></i>
                <span>My Favorite</span>
            </a>
            <div class="lang-selector">
                EN <i class="fa-solid fa-chevron-down arrow"></i>
                <div class="lang-dropdown">
                    <a href="#">Thai (TH)</a>
                    <a href="#">Chinese (ZH)</a>
                    <a href="#">Korean (KO)</a>
                    <a href="#">Russian (RU)</a>
                </div>
            </div>
            <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
        </div>
    </header>

    <div class="post-page-container">
        <div style="background-color: #fdf2ef; padding: 3.5rem 3rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06); border: 2px solid #ecd7ce; margin-bottom: 3rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="font-size: 2.4rem; color: var(--text-dark); font-weight: 800; margin: 0; letter-spacing: -0.5px;">Find your perfect home</h1>
                <p style="color: #64748b; font-size: 1.1rem; margin-top: 12px; font-weight: 400;">Tell us what you're looking for and let the right property find you.</p>
            </div>
            
            <form class="post-form">
                <!-- Card 1: Preferences -->
                <div class="form-section-card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.3rem; color: var(--text-dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 0.8rem;">1. Housing Preferences</h3>
                    
                    <div class="form-row" style="margin-bottom: 1.2rem;">
                        <div class="form-group full-width">
                            <label>Target Location</label>
                            <input type="text" placeholder="e.g. Asoke, Sukhumvit, Phuket">
                        </div>
                    </div>

                    <div class="form-row" style="margin-bottom: 1.2rem;">
                        <div class="form-group">
                            <label>Property Type</label>
                            <select>
                                <option>Condo</option>
                                <option>House</option>
                                <option>Villa</option>
                                <option>Apartment</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Room Type</label>
                            <select>
                                <option>Studio</option>
                                <option>1 Bedroom</option>
                                <option>2 Bedrooms</option>
                                <option>3+ Bedrooms</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row" style="margin-bottom: 1.2rem;">
                        <div class="form-group">
                            <label>Move-in Date</label>
                            <input type="date">
                        </div>
                        <div class="form-group">
                            <label>Rent Period</label>
                            <select>
                                <option>1 Month</option>
                                <option>3 Months</option>
                                <option>6 Months</option>
                                <option selected>1 Year</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Monthly Budget (THB)</label>
                            <input type="number" placeholder="e.g. 15000" style="font-weight: 500; color: var(--primary-red);">
                        </div>
                        <div class="form-group">
                            <label>Pet Friendly</label>
                            <select>
                                <option>No Preference</option>
                                <option>Yes (Must allow pets)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Card 2: Contact Details -->
                <div class="form-section-card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.3rem; color: var(--text-dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 0.8rem;">2. Contact Information</h3>
                    
                    <div class="form-row" style="margin-bottom: 1.2rem;">
                        <div class="form-group">
                            <label><i class="fa-brands fa-line" style="color: #00B900; font-size: 1.4rem; vertical-align: middle; margin-right: 6px;"></i> LINE ID</label>
                            <input type="text" placeholder="Your Line ID">
                        </div>
                        <div class="form-group">
                            <label><i class="fa-brands fa-whatsapp" style="color: #25D366; font-size: 1.4rem; vertical-align: middle; margin-right: 6px;"></i> WhatsApp</label>
                            <input type="text" placeholder="Phone number">
                        </div>
                    </div>
                    
                    <div class="form-row" style="margin-bottom: 1.2rem;">
                        <div class="form-group">
                            <label><i class="fa-brands fa-telegram" style="color: #0088cc; font-size: 1.4rem; vertical-align: middle; margin-right: 6px;"></i> Telegram</label>
                            <input type="text" placeholder="@username">
                        </div>
                        <div class="form-group">
                            <label><i class="fa-solid fa-phone" style="color: #64748b; font-size: 1.2rem; vertical-align: middle; margin-right: 6px;"></i> Other Contact</label>
                            <input type="text" placeholder="Email or Phone">
                        </div>
                    </div>

                    <div class="form-group full-width" style="margin-top: 1rem;">
                        <label>Additional Memo</label>
                        <textarea placeholder="Tell us more about what you are looking for..." rows="5"></textarea>
                    </div>
                </div>

                <button type="button" class="btn-submit-post" style="padding: 1.2rem; font-size: 1.2rem; width: 100%; margin-top: 1rem; box-shadow: 0 5px 15px rgba(211, 34, 42, 0.25);">Post your request now</button>
            </form>
        </div>
    </div>
</body>
</html>
